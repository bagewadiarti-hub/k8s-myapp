apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
    spec:
      serviceAccountName: backend-sa        # use restricted SA instead of default
      containers:
      - name: backend
        image: {{ .Values.backend.image }}
        args:
        - "-text={{ .Values.backend.message }}"
        - "-listen=:{{ .Values.backend.port }}"
        ports:
        - containerPort: {{ .Values.backend.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend-service
spec:
  selector:
    app: {{ .Release.Name }}-backend
  ports:
  - port: 80
    targetPort: {{ .Values.backend.port }}