apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>My K8s App</title></head>
    <body>
      <h1>Frontend running on Kubernetes!</h1>
      <p>Backend says:</p>
      <div id="response">loading...</div>
      <script>
        fetch('/api')
          .then(r => r.text())
          .then(data => document.getElementById('response').innerText = data)
          .catch(e => document.getElementById('response').innerText = 'error: ' + e);
      </script>
    </body>
    </html>